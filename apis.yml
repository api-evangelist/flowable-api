apis:
  - aid: flowable-api:process-engine-api
    name: Flowable Process Engine API
    description: >-
      The Flowable Process Engine API is the primary programmatic interface
      for interacting with Flowable. From a configured ProcessEngine,
      applications obtain a set of services that cover the full BPM
      lifecycle: RepositoryService for deploying and managing process
      definitions, RuntimeService for starting and signaling process
      instances, TaskService for human task assignment and completion,
      IdentityService for users and groups, HistoryService for audit and
      reporting queries, ManagementService for jobs and engine metadata,
      FormService for start and task forms, and DynamicBpmnService for
      runtime modifications. The API supports both fluent typesafe queries
      and native SQL queries.
    humanURL: https://www.flowable.com/open-source/docs/bpmn/ch04-API
    baseURL: https://www.flowable.com/open-source/docs/bpmn/
    tags:
      - BPM
      - BPMN
      - Process Engine
      - Workflows
    properties:
      - url: https://www.flowable.com/open-source/docs/bpmn/ch04-API
        type: Documentation
      - url: https://www.flowable.com/open-source/docs/
        type: DocumentationPortal
  - aid: flowable-api:rest-api
    name: Flowable REST API
    description: >-
      Flowable also ships a packaged REST API webapp that exposes the
      Process Engine services over HTTP. The REST API covers process
      definitions and deployments, process instances and variables, user
      tasks and forms, history, identity, and engine management, allowing
      non-Java clients to drive BPMN, CMMN, and DMN processes from any
      platform.
    humanURL: https://www.flowable.com/open-source/docs/bpmn/
    baseURL: https://www.flowable.com/open-source/docs/bpmn/
    tags:
      - BPM
      - REST
      - Workflows
    properties:
      - url: https://www.flowable.com/open-source/docs/
        type: Documentation
      - url: https://github.com/flowable/flowable-engine
        type: GitHubRepository
