aid: flowable-api
name: Flowable
description: >-
  Flowable connects systems, data, and people for faster and smarter process
  automation, drawing on a long heritage of open source BPM. Flowable
  provides a model-driven, low-code platform for end-to-end automation of
  BPMN, CMMN, and DMN processes, delivered through a programmatic Java
  Process Engine API and a packaged REST API. The Process Engine exposes
  RepositoryService, RuntimeService, TaskService, IdentityService,
  HistoryService, ManagementService, FormService, and DynamicBpmnService for
  managing process definitions, instances, tasks, history, and runtime
  behavior.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2024-11-07'
modified: '2026-04-28'
position: Consumer
tags:
