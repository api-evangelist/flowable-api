    resources:
    - name: repository-process-definitions
      path: /repository/process-definitions
      operations:
      - name: listprocessdefinitions
        method: GET
        description: List process definitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
