      path: /repository/process-definitions/{processDefinitionId}
      operations:
      - name: getprocessdefinition
        method: GET
        description: Get a process definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateprocessdefinition
